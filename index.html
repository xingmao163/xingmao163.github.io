<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="欢迎访问我的个人主页，这里有我的B站主页和更多精彩内容">
    <meta name="author" content="你的名字">
    <title>我的个人主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 60s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* 个人信息卡片 */
        .profile-card {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .name {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .bio {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 社交媒体链接 */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .bilibili {
            background-color: #fb7299;
            box-shadow: 0 4px 15px rgba(251, 114, 153, 0.4);
        }

        .bilibili:hover {
            background-color: #ff8eb3;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(251, 114, 153, 0.6);
        }

        .github {
            background-color: #333;
            box-shadow: 0 4px 15px rgba(51, 51, 51, 0.4);
        }

        .github:hover {
            background-color: #444;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(51, 51, 51, 0.6);
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* 时钟小组件 */
        .clock-card {
            text-align: center;
        }

        .clock {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }

        .date {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .name {
                font-size: 2rem;
            }

            .clock {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 20px 15px;
            }

            .card {
                padding: 20px;
            }

            .profile-card {
                padding: 30px 20px;
            }

            .avatar {
                width: 120px;
                height: 120px;
            }

            .name {
                font-size: 1.8rem;
            }

            .bio {
                font-size: 1rem;
            }

            .social-link {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 个人信息卡片 -->
        <div class="card profile-card">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=yourname" alt="头像" class="avatar">
            <h1 class="name">星猫</h1>
            <p class="bio">Minecraft模组开发者 | 游戏内容创作者 | 热爱技术与分享</p>
            
            <div class="social-links">
                <a href="https://space.bilibili.com/510250271" target="_blank" rel="noopener noreferrer" class="social-link bilibili">
                    <i class="fab fa-bilibili"></i>
                    B站主页
                </a>
                <a href="https://github.com/yourusername" target="_blank" rel="noopener noreferrer" class="social-link github">
                    <i class="fab fa-github"></i>
                    GitHub
                </a>
            </div>
        </div>

        <!-- 实时时钟 -->
        <div class="card clock-card">
            <h3><i class="fas fa-clock"></i> 当前时间</h3>
            <div class="clock" id="clock">00:00:00</div>
            <div class="date" id="date">2026年5月18日 星期一</div>
        </div>
    </div>

    <script>
        // 实时时钟功能
        function updateClock() {
            const now = new Date();
            
            // 更新时间
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            
            // 更新日期
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekDay = weekDays[now.getDay()];
            document.getElementById('date').textContent = `${year}年${month}月${day}日 ${weekDay}`;
        }

        // 初始化
        updateClock();
        setInterval(updateClock, 1000);

        // 添加页面加载动画
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    card.style.transition = 'all 0.5s ease';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, index * 100);
            });
        });
    </script>
</body>
</html>
